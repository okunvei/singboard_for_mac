[package]
name = "singboard"
version = "1.4.0"
edition = "2024"

[lib]
name = "singboard_lib"
crate-type = ["lib"]

[[bin]]
name = "singboard"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-window-state = "2"
tauri-plugin-single-instance = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["process", "rt-multi-thread", "time", "sync"] }
windows-service = "0.7"
windows-sys = { version = "0.59", features = [
  "Win32_Security",
  "Win32_System_Services",
  "Win32_System_Threading",
  "Win32_Foundation",
  "Win32_System_JobObjects",
] }
winreg = "0.55"
log = "0.4"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
flate2 = "1"

[profile.release]
strip = true
lto = true
opt-level = "s"
panic = "abort"
